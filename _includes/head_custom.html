<style>
/* ── In-sidebar heading index (On This Page) ── */
#sidebar-toc {
  border-top: 1px solid #3B4245;
  margin-top: 12px;
  padding-top: 10px;
}
#sidebar-toc summary {
  font-weight: 700;
  color: #FFCD22;
  font-size: 0.82em;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  cursor: pointer;
  padding: 4px 0;
  list-style: none;
  display: flex;
  align-items: center;
  gap: 6px;
}
#sidebar-toc summary::-webkit-details-marker { display: none; }
#sidebar-toc summary::before {
  content: '\25B6';
  font-size: 0.6em;
  transition: transform 0.2s;
}
#sidebar-toc[open] summary::before { transform: rotate(90deg); }
#sidebar-toc .toc-list {
  max-height: 55vh;
  overflow-y: auto;
  padding: 4px 0 0 0;
  margin: 0;
}
#sidebar-toc .toc-list::-webkit-scrollbar { width: 3px; }
#sidebar-toc .toc-list::-webkit-scrollbar-thumb { background: #3B4245; border-radius: 3px; }
#sidebar-toc .toc-list a {
  display: block;
  padding: 2px 8px;
  color: #93C763;
  text-decoration: none;
  font-size: 0.82em;
  line-height: 1.5;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#sidebar-toc .toc-list a:hover,
#sidebar-toc .toc-list a.active {
  color: #FFCD22;
  background: rgba(255, 205, 34, 0.06);
}
#sidebar-toc .toc-list a.toc-h3 {
  padding-left: 20px;
  color: #678CB1;
  font-size: 0.78em;
}
#sidebar-toc .toc-list a.toc-h3:hover,
#sidebar-toc .toc-list a.toc-h3.active {
  color: #FFCD22;
}
</style>

<script defer>
document.addEventListener('DOMContentLoaded', function () {
  var main = document.getElementById('main-content');
  if (!main) return;

  var headings = main.querySelectorAll('h2[id], h3[id]');
  if (headings.length < 2) return;

  var siteNav = document.getElementById('site-nav');
  if (!siteNav) return;

  var details = document.createElement('details');
  details.id = 'sidebar-toc';
  details.open = true;

  var summary = document.createElement('summary');
  summary.textContent = 'On This Page';
  details.appendChild(summary);

  var list = document.createElement('div');
  list.className = 'toc-list';

  headings.forEach(function (h) {
    var a = document.createElement('a');
    a.href = '#' + h.id;
    a.textContent = h.textContent.replace(/^#\s*/, '').replace(/\s*¶$/, '');
    a.className = h.tagName === 'H3' ? 'toc-h3' : 'toc-h2';
    list.appendChild(a);
  });

  details.appendChild(list);
  siteNav.appendChild(details);

  // Scroll-spy: highlight current heading in sidebar TOC
  var tocLinks = list.querySelectorAll('a');
  var observer = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        tocLinks.forEach(function (l) { l.classList.remove('active'); });
        var match = list.querySelector('a[href="#' + entry.target.id + '"]');
        if (match) {
          match.classList.add('active');
          match.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        }
      }
    });
  }, { rootMargin: '-80px 0px -70% 0px', threshold: 0 });

  headings.forEach(function (h) { observer.observe(h); });
});
</script>
