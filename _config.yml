title: DBA Handbook
description: A comprehensive Oracle & PostgreSQL DBA reference — queries, commands, and procedures
url: ""
baseurl: "/Akash-Vault"

theme: just-the-docs

color_scheme: dark

search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/

heading_anchors: true

aux_links:
  "Edit on Admin Panel":
    - "admin/"

aux_links_new_tab: false

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

callouts:
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue

footer_content: "DBA Handbook &mdash; Your personal database administration reference"

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - "*.sql"

defaults:
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "docs/dba-sheet"
    values:
      layout: default
      parent: "DBA Reference Sheet"
      grand_parent: ""
