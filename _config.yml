title: Akash-Vault
description: A comprehensive Oracle & PostgreSQL DBA reference — queries, commands, and procedures
url: "https://akashgupta200.github.io"
baseurl: "/Akash-Vault"

remote_theme: just-the-docs/just-the-docs

color_scheme: custom_dark

permalink: pretty

search_enabled: true
search.heading_level: 3
search.previews: 3
search.preview_words_before: 5
search.preview_words_after: 10
search.tokenizer_separator: /[\s/]+/

heading_anchors: true

aux_links:
  "Edit Content":
    - "/Akash-Vault/admin/"

aux_links_new_tab: true

nav_sort: case_insensitive

back_to_top: true
back_to_top_text: "Back to top"

callouts:
  warning:
    title: Warning
    color: red
  tip:
    title: Tip
    color: green
  note:
    title: Note
    color: blue

footer_content: "Akash-Vault &mdash; Your personal database administration reference"

include:
  - admin

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - README.md
  - SETUP-GUIDE.md
  - "*.sql"

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-include-cache

defaults:
  - scope:
      path: "docs"
    values:
      layout: default
  - scope:
      path: "docs/dba-sheet/"
    values:
      layout: default
      parent: "DBA Reference Sheet"
