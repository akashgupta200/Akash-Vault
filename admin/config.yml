backend:
  name: git-gateway
  repo: akashgupta200/Akash-Vault
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/9a6fb316-fc6f-42ce-996d-f883bc849e7e/pkce
  auth_token_endpoint: /sites/9a6fb316-fc6f-42ce-996d-f883bc849e7e/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://akashgupta200.github.io/Akash-Vault
display_url: https://akashgupta200.github.io/Akash-Vault

media_folder: "docs/assets/images"
public_folder: "/Akash-Vault/assets/images"

collections:
  - name: "main-pages"
    label: "Main Pages (Oracle / PostgreSQL)"
    files:
      - name: "oracle"
        label: "Oracle Queries"
        file: "docs/oracle.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Sidebar Order", name: "nav_order", widget: "number", default: 2 }
          - { label: "Content", name: "body", widget: "markdown" }
      - name: "postgres"
        label: "PostgreSQL Queries"
        file: "docs/postgres.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Sidebar Order", name: "nav_order", widget: "number", default: 3 }
          - { label: "Content", name: "body", widget: "markdown" }
      - name: "home"
        label: "Home Page"
        file: "docs/index.md"
        fields:
          - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Sidebar Order", name: "nav_order", widget: "number", default: 1 }
          - { label: "Content", name: "body", widget: "markdown" }

  - name: "dba-sheet"
    label: "DBA Reference Sheet"
    folder: "docs/dba-sheet"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Layout", name: "layout", widget: "hidden", default: "default" }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Parent", name: "parent", widget: "hidden", default: "DBA Reference Sheet" }
      - { label: "Sidebar Order", name: "nav_order", widget: "number" }
      - { label: "Content", name: "body", widget: "markdown" }
